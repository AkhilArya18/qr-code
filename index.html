<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium QR Code Generator</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="A premium, state-of-the-art QR code generator designed for elegance and speed. Generate and download high-quality QR codes in JPG format.">
    <!-- Google Fonts: Outfit for modern feel -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- QRCode.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
            --glow: rgba(139, 92, 246, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(79, 70, 229, 0.05) 0%, transparent 40%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            perspective: 1000px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px var(--glow);
            text-align: center;
            transition: var(--transition);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -12px rgba(0, 0, 0, 0.6), 0 0 50px var(--glow);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 2rem;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1.5px solid rgba(139, 92, 246, 0.2);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        .qr-wrapper {
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            transition: var(--transition);
        }

        .qr-wrapper::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, var(--primary), transparent, var(--primary));
            border-radius: 18px;
            z-index: -1;
            opacity: 0.5;
            filter: blur(10px);
        }

        #qrcode canvas, #qrcode img {
            max-width: 100% !important;
            height: auto !important;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
            box-shadow: 0 10px 20px -5px var(--glow);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn svg {
            width: 20px;
            height: 20px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .glass-card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="main-content">
        <div class="glass-card">
            <h1>QR Generator</h1>
            <p class="subtitle">Enter your link and download your high-res JPG.</p>

            <div class="input-group">
                <input type="text" id="url-input" placeholder="Paste your link here..." value="https://forms.gle/vvLoxq3jbrdesq9JA" autocomplete="off">
            </div>

            <div class="qr-wrapper">
                <div id="qrcode"></div>
            </div>

            <button class="btn" id="download-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M7.5 12l4.5 4.5m0 0l4.5-4.5M12 3v13.5" />
                </svg>
                Download JPG
            </button>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url-input');
        const qrcodeContainer = document.getElementById('qrcode');
        const downloadBtn = document.getElementById('download-btn');

        let qrcode = new QRCode(qrcodeContainer, {
            text: urlInput.value,
            width: 256,
            height: 256,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        urlInput.addEventListener('input', () => {
            const url = urlInput.value.trim();
            if (url) {
                qrcode.clear();
                qrcode.makeCode(url);
            }
        });

        downloadBtn.addEventListener('click', () => {
            // Get the generated canvas or img
            const qrCanvas = qrcodeContainer.querySelector('canvas');
            const qrImg = qrcodeContainer.querySelector('img');
            
            // Logic to handle both canvas and img modes of qrcode.js
            let source = qrCanvas ? qrCanvas : qrImg;
            
            if (!source) return;

            // Create a temporary canvas for JPG conversion (to ensure white background)
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = 300; // Adding some padding for professional look
            exportCanvas.height = 300;
            const ctx = exportCanvas.getContext('2d');

            // Fill background white (essential for JPG)
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

            // Draw QR code centered with 22px padding
            ctx.drawImage(source, 22, 22, 256, 256);

            // Export to JPG
            const jpgData = exportCanvas.toDataURL('image/jpeg', 1.0);
            
            // Trigger download
            const link = document.createElement('a');
            link.href = jpgData;
            link.download = `qr-code-${Date.now()}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
